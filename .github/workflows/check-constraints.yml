name: Check Constraints

# Consumer caller: invokes the check-constraints composite action directly
# (bypassing the reusable-workflow shim) so we own the checkout step and can
# pass `submodules: recursive`. project.k.json declares a spec inside the
# `autopilot/` submodule, which must be populated for the run to succeed.
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-constraints:
    uses: Clockwork-Pilot/autopilot/.github/workflows/check-constraints.yml@main
    with:
      # project.k.json declares a spec at `autopilot/` (the autopilot
      # submodule), so its spec.k.json must be on disk for the run.
      submodules: recursive
